<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Universe - All Games</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
  --carbon-black: #0A0C10;
  --card-bg: #11161F;
  --neon-green: #2AFF9E;
  --neon-pink: #FF3D6C;
  --text-primary: #FFFFFF;
  --text-secondary: #8A9BB5;
  --star-filled: #FFC107;
  --star-empty: #2E3A48;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: var(--carbon-black);
  font-family: 'Nunito', sans-serif;
  color: var(--text-primary);
  overflow-x: hidden;
  background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxkZWZzPjxwYXR0ZXJuIGlkPSJub2lzZSIgd2lkdGg9IjEwIiBoZWlnaHQ9IjEwIiBwYXR0ZXJuVW5pdHM9InVzZXJTcGFjZU9uVXNlIj48cmVjdCB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiMwYTBjMTAiLz48Y2lyY2xlIGN4PSIxIiBjeT0iMSIgcj0iMSIgZmlsbD0iIzFhMWMxZSIvPjwvcGF0dGVybj48L2RlZnM+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCNub2lzZSkiLz48L3N2Zz4=');
}

.nunito-extra-bold {
  font-weight: 800;
}

/* Header styles (unchanged) */
header {
  background: rgba(0, 0, 0, 0.85);
  padding: 20px 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 2px solid #fff;
}

.logo {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo i {
  font-size: 2.5rem;
  color: #fff;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
}

.logo h1 {
  font-size: 1.8rem;
  font-family: 'Nunito', sans-serif;
  color: #fff;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
  letter-spacing: 1px;
}

nav ul {
  display: flex;
  list-style: none;
  gap: 25px;
}

nav a {
  color: #fff;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 800;
  padding: 8px 15px;
  border-radius: 4px;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: 2px solid #fff;
}

nav a:hover, nav a.active {
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  border: 2px solid #fff;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
}

/* Hero carousel (unchanged) */
.hero {
  position: relative;
  height: 450px;
  overflow: hidden;
  border-bottom: 3px solid #fff;
}

.carousel-container {
  position: relative;
  width: 100%;
  height: 100%;
}

.carousel-slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1s ease-in-out;
  display: flex;
  align-items: center;
  padding: 0 5%;
}

.carousel-slide.active {
  opacity: 1;
}

.slide-background {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0.5;
}

.slide-content {
  position: relative;
  z-index: 2;
  max-width: 900px;
  display: flex;
  align-items: center;
  gap: 40px;
}

.slide-icon {
  width: 180px;
  height: 180px;
  border: 4px solid #fff;
  border-radius: 15px;
  background-color: rgba(0, 0, 0, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.slide-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.slide-icon i {
  font-size: 5rem;
  color: #fff;
}

.slide-icon .rank-badge {
  position: absolute;
  top: -10px;
  right: -10px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  font-weight: bold;
  color: #000;
  border: 3px solid #000;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
}

.slide-icon .rank-1 { background: #FFD700; }
.slide-icon .rank-2 { background: #C0C0C0; }
.slide-icon .rank-3 { background: #CD7F32; }

.slide-info h2 {
  font-size: 2.5rem;
  margin-bottom: 15px;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  letter-spacing: 1px;
}

.slide-info p {
  font-size: 1.1rem;
  margin-bottom: 25px;
  line-height: 1.6;
  max-width: 650px;
}

.slide-info .game-meta {
  display: flex;
  gap: 25px;
  margin-bottom: 25px;
  font-size: 1rem;
}

.slide-info .game-meta span {
  display: flex;
  align-items: center;
  gap: 8px;
}

.slide-play-button {
  display: inline-block;
  padding: 15px 40px;
  background: #fff;
  color: #000;
  text-align: center;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
}

.slide-play-button:hover {
  background: #000;
  color: #fff;
  border: 2px solid #fff;
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
}

.carousel-nav {
  position: absolute;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  z-index: 3;
}

.carousel-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  transition: all 0.3s ease;
}

.carousel-dot.active {
  background: #fff;
  transform: scale(1.3);
}

/* Category Browsing Section */
.category-browsing-section {
  padding: 40px 5%;
  background-color: var(--carbon-black);
}

.category-row {
  margin-bottom: 25px; /* Squished spacing */
}

.category-title {
  font-size: 1.8rem;
  margin-bottom: 15px;
  background: linear-gradient(to right, var(--text-primary), #00FFFF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-transform: uppercase;
  font-weight: 800;
}

.category-track-container {
  background: rgba(17, 22, 31, 0.7);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 15px;
  position: relative;
}

.category-track {
  display: flex;
  gap: 20px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding: 5px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.category-track::-webkit-scrollbar {
  display: none;
}

.game-banner {
  flex: 0 0 auto;
  width: 280px;      /* Wider */
  height: 160px;     /* Taller rectangle */
  border-radius: 24px;
  background-size: cover;
  background-position: center;
  scroll-snap-align: start;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.game-banner:hover {
  transform: scale(1.02);
  box-shadow: 0 0 12px var(--neon-green);
}

/* Hover overlay */
.game-banner .banner-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(4px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s ease;
  pointer-events: none; /* allow click to pass through */
}

.game-banner:hover .banner-overlay {
  opacity: 1;
}

.banner-game-name {
  font-size: 1.1rem;
  font-weight: 800;
  text-align: center;
  padding: 0 8px;
  color: #fff;
}

.banner-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  font-size: 0.9rem;
}

.banner-meta i {
  font-size: 0.9rem;
}

.banner-meta .mode-single {
  color: var(--neon-pink);
}
.banner-meta .mode-multi {
  color: #2AFFE6;
}

.banner-rating {
  display: flex;
  align-items: center;
  gap: 5px;
}

.banner-rating .stars {
  display: flex;
}

.banner-rating .star {
  color: var(--star-empty);
  font-size: 10px;
}
.banner-rating .star.filled {
  color: var(--star-filled);
}

.banner-rating .rating-value {
  font-size: 0.8rem;
  color: var(--text-secondary);
}

.track-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  background: rgba(17, 22, 31, 0.8);
  border: 1px solid var(--neon-green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 10;
}

.category-track-container:hover .track-nav {
  opacity: 1;
}

.track-nav.prev {
  left: 10px;
}

.track-nav.next {
  right: 10px;
}

.track-nav i {
  color: var(--neon-green);
  font-size: 20px;
}

/* Full games list */
.full-games-list {
  padding: 40px 5%;
  background-color: var(--carbon-black);
  border-top: 1px solid rgba(255,255,255,0.1);
}

.full-games-list h2 {
  font-size: 2rem;
  margin-bottom: 25px;
  background: linear-gradient(to right, var(--text-primary), #00FFFF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  font-weight: 800;
}

/* Search bar */
.search-bar-container {
  display: flex;
  justify-content: center;
  margin-bottom: 30px;
}
.search-input {
  width: 100%;
  max-width: 500px;
  padding: 14px 20px;
  background: rgba(17, 22, 31, 0.8);
  border: 2px solid var(--neon-green);
  border-radius: 40px;
  color: var(--text-primary);
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  outline: none;
  transition: box-shadow 0.3s ease;
}
.search-input:focus {
  box-shadow: 0 0 12px var(--neon-green);
}
.search-input::placeholder {
  color: var(--text-secondary);
}

.full-games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.full-game-item {
  background: rgba(17, 22, 31, 0.7);
  backdrop-filter: blur(4px);
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.full-game-item:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 12px var(--neon-green);
}

.full-game-banner {
  width: 100%;
  height: 160px;
  background-size: cover;
  background-position: center;
}

.full-game-info {
  padding: 12px;
  text-align: center;
}

.full-game-title {
  font-weight: 800;
  font-size: 1rem;
  margin-bottom: 6px;
}

.full-game-meta {
  display: flex;
  justify-content: center;
  gap: 12px;
  font-size: 0.8rem;
  color: var(--text-secondary);
}

/* Responsive adjustments */
@media (max-width: 1200px) {
  .game-banner {
    width: 240px;
    height: 135px;
  }
  .full-games-grid {
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
}
@media (max-width: 992px) {
  .game-banner {
    width: 200px;
    height: 115px;
  }
  .category-title {
    font-size: 1.6rem;
  }
  .full-games-grid {
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  }
}
@media (max-width: 768px) {
  .game-banner {
    width: 160px;
    height: 90px;
  }
  .category-browsing-section {
    padding: 30px 5%;
  }
  .category-title {
    font-size: 1.4rem;
  }
  .full-games-grid {
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  }
  .full-game-banner {
    height: 120px;
  }
  .search-input {
    width: 90%;
  }
}

/* Hide old sections */
.games-section, .filter-sidebar, #main-content {
  display: none !important;
}

/* Contact section (unchanged) */
.contact-section {
  padding: 50px 5%;
  background: linear-gradient(135deg, #1a2a6c, #0c1e4d);
  border-top: 3px solid #fff;
  border-bottom: 3px solid #fff;
  display: none;
}

.contact-section.active {
  display: block;
}

.contact-container {
  display: flex;
  gap: 40px;
  max-width: 1400px;
  margin: 0 auto;
}

.form-container {
  flex: 1;
  background: rgba(0, 0, 0, 0.3);
  padding: 30px;
  border: 2px solid #fff;
}

.form-container h3 {
  font-size: 1.5rem;
  margin-bottom: 20px;
  color: #fff;
  letter-spacing: 1px;
  font-weight: 800;
}

.form-group {
  margin-bottom: 20px;
}
.form-group label {
  display: block;
  margin-bottom: 8px;
  font-weight: 500;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid #fff;
  background: rgba(0, 0, 0, 0.5);
  color: #fff;
  font-size: 1rem;
}
.submit-btn {
  background: #fff;
  color: #000;
  border: none;
  padding: 12px 25px;
  cursor: pointer;
  font-weight: 800;
  width: 100%;
  text-transform: uppercase;
}
.submit-btn:hover {
  background: #000;
  color: #fff;
  border: 1px solid #fff;
}
.form-message {
  padding: 15px;
  margin-top: 20px;
  text-align: center;
  display: none;
}
.form-message.success {
  background: rgba(46,204,113,0.3);
  border: 1px solid #2ECC71;
  color: #2ECC71;
  display: block;
}
.form-message.error {
  background: rgba(231,76,60,0.3);
  border: 1px solid #E74C3C;
  color: #E74C3C;
  display: block;
}
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.9);
}
.modal-content {
  background-color: #111;
  margin: 5% auto;
  border: 2px solid #fff;
  width: 90%;
  max-width: 1000px;
  height: 80vh;
  position: relative;
}
.modal-header {
  padding: 15px 20px;
  background: rgba(0,0,0,0.7);
  border-bottom: 1px solid #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-title {
  font-weight: 800;
  color: #fff;
}
.close {
  color: #fff;
  font-size: 28px;
  cursor: pointer;
}
.close:hover {
  color: #f72585;
}
.game-frame {
  width: 100%;
  height: calc(100% - 60px);
  border: none;
}
footer {
  text-align: center;
  padding: 30px;
  color: #a9a9a9;
  border-top: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <i class="fas fa-gamepad"></i>
    <h1>GAME UNIVERSE</h1>
  </div>
  <nav>
    <ul>
      <li><a href="#" class="active" id="home-tab">Home</a></li>
      <li><a href="#" id="contact-tab">Contact Us</a></li>
    </ul>
  </nav>
</header>

<section class="hero">
  <div class="carousel-container" id="topGamesCarousel"></div>
</section>

<!-- Category Browsing Section -->
<section class="category-browsing-section" id="categoryBrowsingSection"></section>

<!-- Full Games List with Search -->
<section class="full-games-list" id="fullGamesList">
  <h2>ALL GAMES</h2>
  <div class="search-bar-container">
    <input type="text" id="gameSearchInput" class="search-input" placeholder="Search for a game...">
  </div>
  <div class="full-games-grid" id="fullGamesGrid"></div>
</section>

<!-- Contact Section -->
<section class="contact-section" id="contact-section">
  <div class="section-title">
    <h2>CONTACT US</h2>
    <p>Have a suggestion or found an issue? Let us know!</p>
  </div>
  <div class="tab-navigation">
    <button class="tab-button active" id="suggest-tab">Suggest a Game</button>
    <button class="tab-button" id="report-tab">Report an Issue</button>
  </div>
  <div class="contact-container">
    <div class="form-container" id="suggest-form-container">
      <h3>SUGGEST A GAME</h3>
      <form id="suggestGameForm">
        <div class="form-group"><label>YOUR NAME</label><input type="text" id="suggestName" required></div>
        <div class="form-group"><label>YOUR EMAIL</label><input type="email" id="suggestEmail" required></div>
        <div class="form-group"><label>GAME TITLE</label><input type="text" id="gameTitle" required></div>
        <div class="form-group"><label>GAME BANNER (URL)</label><input type="url" id="gameBanner" required></div>
        <div class="form-group"><label>GAME LINK</label><input type="url" id="gameLink" required></div>
        <div class="form-group"><label>GAME DESCRIPTION</label><textarea id="gameDescription" required></textarea></div>
        <button type="submit" class="submit-btn">SUBMIT SUGGESTION</button>
        <div id="suggestMessage" class="form-message"></div>
      </form>
    </div>
    <div class="form-container" id="report-form-container" style="display: none;">
      <h3>REPORT AN ISSUE</h3>
      <form id="reportIssueForm">
        <div class="form-group"><label>YOUR NAME</label><input type="text" id="reportName" required></div>
        <div class="form-group"><label>YOUR EMAIL</label><input type="email" id="reportEmail" required></div>
        <div class="form-group"><label>SELECT GAME</label><select id="issueGame"><option value="">-- SELECT A GAME --</option></select></div>
        <div class="form-group"><label>ISSUE DESCRIPTION</label><textarea id="issueDescription" required></textarea></div>
        <button type="submit" class="submit-btn">REPORT ISSUE</button>
        <div id="reportMessage" class="form-message"></div>
      </form>
    </div>
  </div>
</section>

<div id="gameModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h2 class="modal-title" id="modalGameTitle">GAME TITLE</h2><span class="close">×</span></div>
    <iframe id="gameFrame" class="game-frame" src="" frameborder="0"></iframe>
  </div>
</div>

<footer><p>© 2026 GAME UNIVERSE. ALL RIGHTS RESERVED. | DESIGNED WITH ❤️ BY BRENDAN</p></footer>

firebase.initializeApp(firebaseConfig);

// Tab switching (fixed contact toggle)
const homeTab = document.getElementById('home-tab');
const contactTab = document.getElementById('contact-tab');
const categorySection = document.getElementById('categoryBrowsingSection');
const fullGamesList = document.getElementById('fullGamesList');
const contactSection = document.getElementById('contact-section');

homeTab.addEventListener('click', function(e) {
  e.preventDefault();
  categorySection.style.display = 'block';
  fullGamesList.style.display = 'block';
  contactSection.classList.remove('active');
  this.classList.add('active');
  contactTab.classList.remove('active');
});

contactTab.addEventListener('click', function(e) {
  e.preventDefault();
  categorySection.style.display = 'none';
  fullGamesList.style.display = 'none';
  contactSection.classList.add('active');
  this.classList.add('active');
  homeTab.classList.remove('active');
});

// Contact form tabs
document.getElementById('suggest-tab').addEventListener('click', function() {
  document.getElementById('suggest-form-container').style.display = 'block';
  document.getElementById('report-form-container').style.display = 'none';
  this.classList.add('active');
  document.getElementById('report-tab').classList.remove('active');
});
document.getElementById('report-tab').addEventListener('click', function() {
  document.getElementById('suggest-form-container').style.display = 'none';
  document.getElementById('report-form-container').style.display = 'block';
  this.classList.add('active');
  document.getElementById('suggest-tab').classList.remove('active');
});

// Helper functions
async function getUserIP() {
  try {
    const res = await fetch('https://api.ipify.org?format=json');
    const data = await res.json();
    return data.ip;
  } catch { return "unknown"; }
}
async function logGamePlay(gameId, gameTitle) {
  try {
    const ip = await getUserIP();
    await db.collection("plays").add({ gameId, gameTitle, ip, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
  } catch(e) { console.error(e); }
}
async function getGames() {
  try {
    const gamesSnap = await db.collection("games").orderBy("createdAt", "desc").get();
    const games = gamesSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    const playsSnap = await db.collection("plays").get();
    const playCounts = {};
    playsSnap.forEach(doc => { playCounts[doc.data().gameId] = (playCounts[doc.data().gameId] || 0) + 1; });
    const sortedByPlays = [...games].sort((a,b) => (playCounts[b.id]||0) - (playCounts[a.id]||0));
    const topGames = sortedByPlays.slice(0,10).map((g,i)=>({...g, rank:i+1}));
    const remaining = sortedByPlays.slice(10);
    const now = new Date();
    const fiveDaysAgo = new Date(now - 5*24*60*60*1000);
    const newGames = [], olderGames = [];
    remaining.forEach(g => {
      const uploadDate = g.createdAt?.toDate ? g.createdAt.toDate() : new Date(g.createdAt);
      if(uploadDate >= fiveDaysAgo) newGames.push(g);
      else olderGames.push(g);
    });
    newGames.sort((a,b)=> (b.createdAt?.toDate()||0) - (a.createdAt?.toDate()||0));
    olderGames.sort((a,b)=> a.title.localeCompare(b.title));
    return { topGames, newGames, olderGames, allGames: [...topGames, ...newGames, ...olderGames] };
  } catch(e) { console.error(e); return { topGames:[], newGames:[], olderGames:[], allGames:[] }; }
}

function renderTopGamesCarousel(topGames) {
  const container = document.getElementById('topGamesCarousel');
  container.innerHTML = '';
  topGames.forEach((game, idx) => {
    const slide = document.createElement('div');
    slide.className = `carousel-slide ${idx===0?'active':''}`;
    let rankClass = '';
    if(game.rank===1) rankClass='rank-1';
    else if(game.rank===2) rankClass='rank-2';
    else if(game.rank===3) rankClass='rank-3';
    slide.innerHTML = `
      <div class="slide-background" style="background-image:url('${game.image}')"></div>
      <div class="slide-content">
        <div class="slide-icon">${game.icon?`<img src="${game.icon}">`:'<i class="fas fa-gamepad"></i>'}<div class="rank-badge ${rankClass}">${game.rank}</div></div>
        <div class="slide-info">
          <h2>${game.title}</h2>
          <div class="game-meta"><span><i class="fas fa-star"></i> ${game.rating||'N/A'}</span><span><i class="${game.multiplayer?'fas fa-users':'fas fa-user'}"></i> ${game.multiplayer?'Multiplayer':'Single Player'}</span><span><i class="fas fa-trophy"></i> TOP ${game.rank}</span></div>
          <p>${game.description||'No description'}</p>
          <button class="slide-play-button" data-url="${game.url}" data-id="${game.id}" data-title="${game.title}">PLAY NOW</button>
        </div>
      </div>
    `;
    container.appendChild(slide);
  });
  const nav = document.createElement('div'); nav.className='carousel-nav';
  topGames.forEach((_,i)=>{ const dot=document.createElement('div'); dot.className=`carousel-dot ${i===0?'active':''}`; dot.addEventListener('click',()=>showSlide(i)); nav.appendChild(dot); });
  container.appendChild(nav);
  document.querySelectorAll('.slide-play-button').forEach(btn=>btn.addEventListener('click',async function(e){
    e.preventDefault();
    const id=this.dataset.id, url=this.dataset.url, title=this.dataset.title;
    await logGamePlay(id,title);
    document.getElementById('modalGameTitle').textContent=title;
    document.getElementById('gameFrame').src=url;
    document.getElementById('gameModal').style.display='block';
    document.body.style.overflow='hidden';
  }));
  startCarousel();
}
let currentSlide=0, interval;
function showSlide(i){ const slides=document.querySelectorAll('.carousel-slide'), dots=document.querySelectorAll('.carousel-dot'); if(i>=slides.length)i=0; if(i<0)i=slides.length-1; slides.forEach(s=>s.classList.remove('active')); dots.forEach(d=>d.classList.remove('active')); slides[i].classList.add('active'); dots[i].classList.add('active'); currentSlide=i; }
function nextSlide(){ showSlide(currentSlide+1); }
function startCarousel(){ clearInterval(interval); interval=setInterval(nextSlide,5000); }

function createBanner(game, category) {
  const banner = document.createElement('div');
  banner.className = 'game-banner';
  banner.style.backgroundImage = `url('${game.image}')`;
  banner.dataset.id = game.id;
  banner.dataset.title = game.title;
  banner.dataset.url = game.url;
  banner.dataset.rating = game.rating || 3;
  banner.dataset.multiplayer = game.multiplayer ? 'true' : 'false';
  // Overlay
  const starsHtml = [1,2,3,4,5].map(s => `<i class="fas fa-star star ${s <= Math.floor(game.rating||3) ? 'filled' : ''}"></i>`).join('');
  banner.innerHTML = `
    <div class="banner-overlay">
      <div class="banner-game-name">${game.title}</div>
      <div class="banner-meta">
        <i class="${game.multiplayer ? 'fas fa-users mode-multi' : 'fas fa-user mode-single'}"></i>
        <div class="banner-rating">
          <div class="stars">${starsHtml}</div>
          <span class="rating-value">${(game.rating||3).toFixed(1)}/5</span>
        </div>
      </div>
    </div>
  `;
  banner.addEventListener('click', async function() {
    await logGamePlay(this.dataset.id, this.dataset.title);
    document.getElementById('modalGameTitle').textContent = this.dataset.title;
    document.getElementById('gameFrame').src = this.dataset.url;
    document.getElementById('gameModal').style.display = 'block';
    document.body.style.overflow = 'hidden';
  });
  return banner;
}

function createCategoryRow(title, games, container) {
  if(!games.length) return;
  const row = document.createElement('div');
  row.className = 'category-row';
  row.innerHTML = `<h2 class="category-title nunito-extra-bold">${title}</h2><div class="category-track-container"><div class="category-track" id="track-${title.replace(/\s/g,'')}"></div><div class="track-nav prev"><i class="fas fa-chevron-left"></i></div><div class="track-nav next"><i class="fas fa-chevron-right"></i></div></div>`;
  const track = row.querySelector('.category-track');
  games.forEach(game => { track.appendChild(createBanner(game, title)); });
  container.appendChild(row);
  initTrackNavigation(track, row);
}
function initTrackNavigation(track, row) {
  const prev = row.querySelector('.track-nav.prev'), next = row.querySelector('.track-nav.next');
  let isDown=false, startX, scrollLeft;
  track.addEventListener('mousedown',(e)=>{ isDown=true; startX=e.pageX-track.offsetLeft; scrollLeft=track.scrollLeft; });
  track.addEventListener('mouseleave',()=>{ isDown=false; });
  track.addEventListener('mouseup',()=>{ isDown=false; });
  track.addEventListener('mousemove',(e)=>{ if(!isDown)return; e.preventDefault(); const x=e.pageX-track.offsetLeft; const walk=(x-startX)*2; track.scrollLeft=scrollLeft-walk; });
  track.addEventListener('touchstart',(e)=>{ isDown=true; startX=e.touches[0].pageX-track.offsetLeft; scrollLeft=track.scrollLeft; });
  track.addEventListener('touchend',()=>{ isDown=false; });
  track.addEventListener('touchmove',(e)=>{ if(!isDown)return; const x=e.touches[0].pageX-track.offsetLeft; const walk=(x-startX)*2; track.scrollLeft=scrollLeft-walk; });
  prev.addEventListener('click',()=> track.scrollBy({left:-300, behavior:'smooth'}));
  next.addEventListener('click',()=> track.scrollBy({left:300, behavior:'smooth'}));
}

function renderCategoryBrowsing(gamesData) {
  const container = document.getElementById('categoryBrowsingSection');
  container.innerHTML = '';
  createCategoryRow('TOP', gamesData.topGames, container);
  createCategoryRow('NEW', gamesData.newGames, container);
  const tagGroups = {};
  gamesData.allGames.forEach(g => { if(g.tags) g.tags.forEach(t=>{ if(!tagGroups[t]) tagGroups[t]=[]; tagGroups[t].push(g); }); });
  Object.keys(tagGroups).sort().forEach(tag => { createCategoryRow(tag, tagGroups[tag].slice(0,20), container); });
}

// Render full games list (alphabetical) with search filter
function renderFullGamesList(allGames) {
  const grid = document.getElementById('fullGamesGrid');
  const searchInput = document.getElementById('gameSearchInput');
  
  // Sort games alphabetically by title
  const sortedGames = [...allGames].sort((a, b) => a.title.localeCompare(b.title));
  
  function filterAndRender() {
    const query = searchInput.value.toLowerCase().trim();
    const filtered = sortedGames.filter(game => game.title.toLowerCase().includes(query));
    grid.innerHTML = '';
    filtered.forEach(game => {
      const item = document.createElement('div');
      item.className = 'full-game-item';
      item.dataset.id = game.id;
      item.dataset.url = game.url;
      item.dataset.title = game.title;
      item.innerHTML = `
        <div class="full-game-banner" style="background-image:url('${game.image}')"></div>
        <div class="full-game-info">
          <div class="full-game-title">${game.title}</div>
          <div class="full-game-meta">
            <span><i class="fas fa-star"></i> ${game.rating||'N/A'}</span>
            <span><i class="${game.multiplayer?'fas fa-users':'fas fa-user'}"></i> ${game.multiplayer?'Multiplayer':'Single Player'}</span>
          </div>
        </div>
      `;
      item.addEventListener('click', async function() {
        await logGamePlay(this.dataset.id, this.dataset.title);
        document.getElementById('modalGameTitle').textContent = this.dataset.title;
        document.getElementById('gameFrame').src = this.dataset.url;
        document.getElementById('gameModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
      });
      grid.appendChild(item);
    });
  }
  
  filterAndRender();
  searchInput.addEventListener('input', filterAndRender);
}

// Initialize
document.addEventListener('DOMContentLoaded', async function() {
  const gamesData = await getGames();
  renderTopGamesCarousel(gamesData.topGames);
  renderCategoryBrowsing(gamesData);
  renderFullGamesList(gamesData.allGames);
  // Populate issue game select
  const issueSelect = document.getElementById('issueGame');
  issueSelect.innerHTML = '<option value="">-- SELECT A GAME --</option>';
  gamesData.allGames.forEach(g => { const opt = document.createElement('option'); opt.value=g.id; opt.textContent=g.title; issueSelect.appendChild(opt); });
  // Form handlers
  document.getElementById('suggestGameForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const data = { name:document.getElementById('suggestName').value, email:document.getElementById('suggestEmail').value, gameTitle:document.getElementById('gameTitle').value, gameBanner:document.getElementById('gameBanner').value, gameLink:document.getElementById('gameLink').value, gameDescription:document.getElementById('gameDescription').value, timestamp:firebase.firestore.FieldValue.serverTimestamp() };
    try { await db.collection("gameSuggestions").add(data); document.getElementById('suggestMessage').textContent="Submitted!"; document.getElementById('suggestMessage').className="form-message success"; this.reset(); } catch(err){ document.getElementById('suggestMessage').textContent="Error"; document.getElementById('suggestMessage').className="form-message error"; }
  });
  document.getElementById('reportIssueForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const gameId = document.getElementById('issueGame').value;
    if(!gameId){ document.getElementById('reportMessage').textContent="Select a game"; document.getElementById('reportMessage').className="form-message error"; return; }
    const gameDoc = await db.collection("games").doc(gameId).get();
    const gameTitle = gameDoc.exists ? gameDoc.data().title : "Unknown";
    await db.collection("issueReports").add({ name:document.getElementById('reportName').value, email:document.getElementById('reportEmail').value, gameId, gameTitle, issueDescription:document.getElementById('issueDescription').value, timestamp:firebase.firestore.FieldValue.serverTimestamp() });
    document.getElementById('reportMessage').textContent="Reported!"; document.getElementById('reportMessage').className="form-message success"; this.reset();
  });
  // Modal close
  const modal = document.getElementById('gameModal'), close = document.querySelector('.close');
  close.onclick = ()=>{ modal.style.display='none'; document.getElementById('gameFrame').src=''; document.body.style.overflow='auto'; };
  window.onclick = (e)=>{ if(e.target===modal){ modal.style.display='none'; document.getElementById('gameFrame').src=''; document.body.style.overflow='auto'; } };
  document.addEventListener('keydown', e=>{ if(e.key==='Escape' && modal.style.display==='block'){ modal.style.display='none'; document.getElementById('gameFrame').src=''; document.body.style.overflow='auto'; } });
});
