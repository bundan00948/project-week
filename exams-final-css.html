<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Quiz – Cascading Style Sheets Test</title>
    <style>
        /* ----- global reset & base ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4f7fc;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 30px 20px;
            color: #1e2b3a;
        }

        .quiz-container {
            max-width: 920px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.12);
            padding: 40px 45px;
        }

        /* ----- header ----- */
        .quiz-header {
            border-bottom: 3px solid #e8edf4;
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
        }

        .quiz-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0b1a2e;
        }

        .quiz-header .sub {
            font-size: 15px;
            color: #4a5f73;
            font-weight: 500;
        }

        .score-badge {
            background: #1e2b3a;
            color: #fff;
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .score-badge span {
            color: #8bb9fe;
        }

        /* ----- questions ----- */
        .question {
            background: #f9faff;
            border-radius: 16px;
            padding: 22px 26px;
            margin-bottom: 18px;
            border: 1px solid #e9eef5;
            transition: background 0.15s;
        }

        .question.correct {
            border-left: 6px solid #2b8c5e;
            background: #f3faf7;
        }

        .question.incorrect {
            border-left: 6px solid #c73e3e;
            background: #fdf5f5;
        }

        .q-head {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .q-number {
            font-weight: 700;
            font-size: 17px;
            color: #1e2b3a;
            background: #e2e9f3;
            padding: 0 14px;
            border-radius: 30px;
            line-height: 30px;
            min-width: 48px;
            text-align: center;
        }

        .q-marks {
            font-size: 14px;
            font-weight: 600;
            color: #4a6a85;
            background: #e8edf4;
            padding: 0 14px;
            border-radius: 30px;
            line-height: 28px;
        }

        .q-text {
            font-size: 16.5px;
            font-weight: 500;
            line-height: 1.5;
            margin: 8px 0 12px 0;
            color: #0f1e2f;
        }

        .q-text code,
        .code-snip {
            background: #eef3f9;
            padding: 2px 10px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 15px;
            color: #1b3a5c;
            display: inline-block;
        }

        .code-block {
            background: #1a2533;
            color: #d6e3f0;
            padding: 14px 20px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 15px;
            line-height: 1.8;
            margin: 10px 0 14px 0;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .code-block .hl {
            background: #f5b34240;
            padding: 0 4px;
            border-radius: 4px;
        }

        .code-block .hl-purple {
            background: #b77ef040;
            padding: 0 4px;
            border-radius: 4px;
        }

        /* ----- options (radio) ----- */
        .options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 4px 0;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            border-radius: 10px;
            background: #ffffff;
            border: 1px solid #dfe6ef;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.1s, border 0.1s;
        }

        .options label:hover {
            background: #f0f5fe;
            border-color: #b8cce0;
        }

        .options input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #1f6390;
            flex-shrink: 0;
        }

        .options .selected-correct {
            background: #dff0e6;
            border-color: #2b8c5e;
        }

        .options .selected-incorrect {
            background: #fce8e8;
            border-color: #c73e3e;
        }

        .options .show-correct {
            background: #dff0e6;
            border-color: #2b8c5e;
            opacity: 0.9;
        }

        /* ----- text inputs (coding) ----- */
        .code-input-area {
            margin: 10px 0 4px 0;
        }

        .code-input-area textarea {
            width: 100%;
            min-height: 80px;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 15px;
            border: 2px solid #d6e0ea;
            border-radius: 12px;
            background: #fafcff;
            resize: vertical;
            transition: border 0.15s;
            color: #0f1e2f;
            line-height: 1.6;
        }

        .code-input-area textarea:focus {
            outline: none;
            border-color: #1f6390;
            box-shadow: 0 0 0 4px #1f639020;
        }

        .code-input-area textarea.correct-input {
            border-color: #2b8c5e;
            background: #f3faf7;
        }

        .code-input-area textarea.incorrect-input {
            border-color: #c73e3e;
            background: #fdf5f5;
        }

        .feedback {
            margin-top: 10px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14.5px;
            line-height: 1.5;
            background: #f0f4fa;
            border: 1px solid #dce4ef;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct-fb {
            background: #e6f4ed;
            border-color: #8fc7ae;
            color: #1a533a;
        }

        .feedback.incorrect-fb {
            background: #fceeec;
            border-color: #e6b4b4;
            color: #7a2e2e;
        }

        .feedback .fb-label {
            font-weight: 700;
            margin-right: 6px;
        }

        /* ----- submit / reset ----- */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 2px solid #e8edf4;
            justify-content: center;
        }

        .btn {
            background: #1e2b3a;
            color: #fff;
            border: none;
            padding: 14px 44px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            background: #0f1e2f;
            transform: scale(1.01);
        }

        .btn-secondary {
            background: #dce4ef;
            color: #1e2b3a;
        }

        .btn-secondary:hover {
            background: #c8d3e2;
        }

        .btn-success {
            background: #1f7a4e;
        }

        .btn-success:hover {
            background: #14633d;
        }

        .result-box {
            margin-top: 24px;
            padding: 24px 30px;
            background: #1e2b3a;
            border-radius: 16px;
            color: #fff;
            text-align: left;
            display: none;
        }

        .result-box.show {
            display: block;
        }

        .result-box .score-row {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .result-box .score-row .out-of {
            color: #8bb9fe;
        }

        .result-box .grade-row {
            font-size: 20px;
            font-weight: 600;
            margin: 8px 0 12px 0;
        }

        .result-box .grade-row .grade-label {
            background: #f5b342;
            padding: 4px 16px;
            border-radius: 30px;
            color: #1e2b3a;
            display: inline-block;
        }

        .result-box .summary-text {
            font-size: 16px;
            font-weight: 400;
            color: #b6ccde;
            line-height: 1.6;
            margin-top: 8px;
            border-top: 1px solid #3a4b5e;
            padding-top: 14px;
        }

        .result-box .summary-text strong {
            color: #fff;
        }

        .result-box .summary-text .suggestion {
            color: #f5b342;
            font-weight: 500;
            margin-top: 6px;
        }

        /* ----- responsive ----- */
        @media (max-width: 640px) {
            .quiz-container {
                padding: 20px 16px;
            }
            .quiz-header {
                flex-direction: column;
                align-items: stretch;
            }
            .score-badge {
                align-self: flex-start;
            }
            .q-head {
                gap: 8px;
            }
            .q-number {
                font-size: 14px;
                min-width: 40px;
                line-height: 26px;
            }
            .q-text {
                font-size: 15px;
            }
            .code-block {
                font-size: 13px;
                padding: 10px 14px;
            }
            .btn {
                padding: 12px 28px;
                font-size: 16px;
                width: 100%;
            }
            .options label {
                font-size: 14px;
                padding: 6px 12px;
            }
        }

        @media print {
            .btn,
            .actions {
                display: none !important;
            }
            .feedback {
                display: block !important;
                background: #f0f4fa !important;
                border: 1px solid #ccc !important;
            }
            .question {
                break-inside: avoid;
                border: 1px solid #ccc !important;
            }
            .result-box {
                display: block !important;
                background: #eee !important;
                color: #111 !important;
            }
            .result-box .out-of {
                color: #1f6390 !important;
            }
        }
    </style>
</head>

        // ===================================================================
        // RENDER
        // ===================================================================

        const container = document.getElementById('questionsContainer');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const totalPossibleSpan = document.getElementById('totalPossible');
        const finalScoreSpan = document.getElementById('finalScore');
        const finalTotalSpan = document.getElementById('finalTotal');
        const resultBox = document.getElementById('resultBox');
        const resultDetail = document.getElementById('resultDetail');
        const gradeLabel = document.getElementById('gradeLabel');

        let totalMarks = 0;
        QUESTIONS.forEach(q => { totalMarks += q.maxMarks; });
        totalPossibleSpan.textContent = totalMarks;
        finalTotalSpan.textContent = totalMarks;

        function renderQuestions() {
            let html = '';
            QUESTIONS.forEach((q, idx) => {
                const qNum = idx + 1;
                const marksStr = q.maxMarks > 0 ? `${q.marks}/${q.maxMarks}` : '0/0';

                html += `<div class="question" id="qContainer_${q.id}" data-qid="${q.id}">`;
                html += `<div class="q-head">`;
                html += `<span class="q-number">Q${qNum}</span>`;
                html += `<span class="q-marks">${marksStr}</span>`;
                html += `</div>`;
                html += `<div class="q-text">${q.label}</div>`;

                if (q.codeHint) {
                    html += `<div class="code-block">${q.codeHint}</div>`;
                }

                if (q.type === 'mc') {
                    html += `<div class="options" id="opts_${q.id}">`;
                    q.options.forEach((opt, oi) => {
                        const val = String.fromCharCode(65 + oi);
                        html += `<label data-optindex="${oi}">`;
                        html += `<input type="radio" name="${q.id}" value="${oi}" />`;
                        html += `<span>${val}. ${escapeHtml(opt)}</span>`;
                        html += `</label>`;
                    });
                    html += `</div>`;
                } else if (q.type === 'text') {
                    html +=
                        `<div class="code-input-area"><input type="text" name="${q.id}" placeholder="${escapeHtml(q.placeholder || '')}" style="width:100%;padding:12px 16px;border-radius:10px;border:2px solid #d6e0ea;font-size:15px;" /></div>`;
                } else if (q.type === 'code') {
                    html += `<div class="code-input-area">`;
                    html +=
                        `<textarea name="${q.id}" placeholder="${escapeHtml(q.placeholder || '')}" rows="3"></textarea>`;
                    html += `</div>`;
                }

                html += `<div class="feedback" id="fb_${q.id}"></div>`;
                html += `</div>`;
            });
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ===================================================================
        // GRADING with new 1-5+ scale
        // ===================================================================

        function getGrade(percentage) {
            if (percentage >= 90) return '5';
            if (percentage >= 85) return '4+';
            if (percentage >= 75) return '4';
            if (percentage >= 65) return '3+';
            if (percentage >= 55) return '3';
            if (percentage >= 45) return '2+';
            if (percentage >= 35) return '2';
            if (percentage >= 25) return '1+';
            return '1';
        }

        function getSuggestion(percentage, incorrectQuestionIds) {
            // Determine weak areas based on question categories
            // For simplicity, we'll use generic advice based on score.
            if (percentage >= 85) {
                return 'You have a strong grasp of CSS. To push further, practice writing complex selectors and responsive layouts.';
            } else if (percentage >= 65) {
                return 'You understand the basics but should review selector syntax, property-value pairs, and common CSS properties. Try more coding exercises.';
            } else if (percentage >= 45) {
                return 'Focus on the fundamental concepts: selectors, declarations, properties, and values. Revisit the difference between inline and external CSS.';
            } else {
                return 'Start from the beginning: learn what CSS is, how to link it, and the basic syntax of selectors and declarations. Use online interactive tutorials.';
            }
        }

        function gradeQuiz() {
            let totalEarned = 0;
            let totalPossible = 0;
            let details = [];
            let correctCount = 0;
            let totalScoredQuestions = 0;
            let incorrectQuestionIds = [];

            QUESTIONS.forEach((q, idx) => {
                const container = document.getElementById(`qContainer_${q.id}`);
                const fb = document.getElementById(`fb_${q.id}`);
                let earned = 0;
                let maxPossible = q.maxMarks;
                let isCorrect = false;
                let feedbackMsg = '';

                container.classList.remove('correct', 'incorrect');

                if (q.type === 'mc') {
                    const selected = document.querySelector(`input[name="${q.id}"]:checked`);
                    const userVal = selected ? parseInt(selected.value) : -1;
                    const correctVals = Array.isArray(q.correct) ? q.correct : [q.correct];
                    const labels = container.querySelectorAll('.options label');

                    labels.forEach((label, li) => {
                        label.classList.remove('selected-correct', 'selected-incorrect', 'show-correct');
                        if (correctVals.includes(li)) {
                            label.classList.add('show-correct');
                        }
                        if (li === userVal && correctVals.includes(userVal)) {
                            label.classList.add('selected-correct');
                        } else if (li === userVal && !correctVals.includes(userVal)) {
                            label.classList.add('selected-incorrect');
                        }
                    });

                    if (correctVals.includes(userVal)) {
                        earned = maxPossible;
                        isCorrect = true;
                        container.classList.add('correct');
                        feedbackMsg = '✅ Correct!';
                    } else {
                        earned = 0;
                        container.classList.add('incorrect');
                        const correctText = q.options[correctVals[0]] || '';
                        feedbackMsg = `❌ Incorrect. The correct answer was: "${correctText}".`;
                        incorrectQuestionIds.push(q.id);
                    }
                } else if (q.type === 'text') {
                    earned = 0;
                    maxPossible = 0;
                    feedbackMsg = '';
                } else if (q.type === 'code') {
                    const textarea = container.querySelector(`textarea[name="${q.id}"]`);
                    const userInput = textarea ? textarea.value.trim() : '';
                    const result = gradeCodeQuestion(q, userInput);
                    earned = result.earned;
                    maxPossible = q.maxMarks;
                    isCorrect = (earned >= maxPossible && maxPossible > 0);
                    feedbackMsg = result.feedback;

                    if (textarea) {
                        textarea.classList.remove('correct-input', 'incorrect-input');
                        if (earned > 0 && earned >= maxPossible) {
                            textarea.classList.add('correct-input');
                            container.classList.add('correct');
                        } else if (earned > 0) {
                            textarea.classList.add('incorrect-input');
                            container.classList.add('incorrect');
                        } else {
                            textarea.classList.add('incorrect-input');
                            container.classList.add('incorrect');
                        }
                    }
                    if (!isCorrect) incorrectQuestionIds.push(q.id);
                }

                const marksSpan = container.querySelector('.q-marks');
                if (marksSpan) {
                    const displayMax = (q.type === 'text' && q.maxMarks === 0) ? 0 : maxPossible;
                    marksSpan.textContent = `${earned}/${displayMax}`;
                }

                if (fb) {
                    fb.className = 'feedback show';
                    fb.classList.add(isCorrect ? 'correct-fb' : 'incorrect-fb');
                    if (q.type === 'code' && feedbackMsg) {
                        fb.innerHTML = feedbackMsg;
                    } else if (q.type === 'mc' && feedbackMsg) {
                        fb.innerHTML = feedbackMsg;
                    } else if (q.type === 'text') {
                        fb.innerHTML = '📝 Name recorded (not scored).';
                        fb.className = 'feedback show correct-fb';
                    } else {
                        fb.innerHTML = '';
                        fb.className = 'feedback';
                    }
                }

                totalEarned += earned;
                totalPossible += maxPossible;
                if (maxPossible > 0) {
                    totalScoredQuestions++;
                    if (isCorrect) correctCount++;
                }
                details.push({ qId: q.id, earned, maxPossible, isCorrect });
            });

            // Update score display
            scoreDisplay.textContent = totalEarned;
            finalScoreSpan.textContent = totalEarned;
            finalTotalSpan.textContent = totalPossible;

            // Calculate percentage
            const pct = totalPossible > 0 ? Math.round((totalEarned / totalPossible) * 100) : 0;
            const grade = getGrade(pct);
            gradeLabel.textContent = grade;

            // Build summary
            const totalQs = QUESTIONS.filter(q => q.maxMarks > 0).length;
            const incorrectCount = totalScoredQuestions - correctCount;
            let summary = `<strong>Summary:</strong> You answered <strong>${correctCount}</strong> out of <strong>${totalQs}</strong> scored questions correctly (${pct}%).<br>`;
            if (incorrectCount > 0) {
                summary += `You got <strong>${incorrectCount}</strong> questions wrong. `;
            } else {
                summary += `Perfect! All questions correct. 🎉`;
            }

            // Add a personalised suggestion
            const suggestion = getSuggestion(pct, incorrectQuestionIds);
            summary += `<br><div class="suggestion">📌 <strong>Next Steps:</strong> ${suggestion}</div>`;

            // Breakdown of correct/incorrect
            let breakdown = '<br><strong>Breakdown:</strong> ';
            const qNumbers = QUESTIONS.map((q, i) => {
                if (q.maxMarks === 0) return null;
                const isCorrect = details[i]?.isCorrect;
                return isCorrect ? `Q${i+1}✅` : `Q${i+1}❌`;
            }).filter(Boolean);
            breakdown += qNumbers.join(' ');

            resultDetail.innerHTML = summary + breakdown;

            resultBox.classList.add('show');
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function gradeCodeQuestion(q, input) {
            const max = q.maxMarks;
            let earned = 0;
            let parts = [];
            const clean = input.replace(/\s+/g, ' ').trim();

            if (q.id === 'q32') {
                if (/hover/i.test(clean)) earned += 1;
                if (/color\s*:\s*blue/i.test(clean)) earned += 1;
                parts.push('Check for "hover" and "color: blue"');
                if (earned === 0) parts.push('No key parts found.');
                else if (earned < max) parts.push(`Found ${earned} of ${max} required parts.`);
                else parts.push('✅ Perfect!');
            } else if (q.id === 'q33') {
                if (/body\s*\{/i.test(clean)) earned += 0.5;
                if (/background-image\s*:/i.test(clean)) earned += 0.5;
                if (/url\s*\(/i.test(clean)) earned += 0.5;
                if (/pageback\.jpg/i.test(clean)) earned += 0.5;
                earned = Math.round(earned);
                parts.push('Check for "body", "background-image", "url()", "pageback.jpg"');
                if (earned === 0) parts.push('No key parts found.');
                else if (earned < max) parts.push(`Found ${earned} of ${max} required parts.`);
                else parts.push('✅ Perfect!');
            } else if (q.id === 'q34') {
                if (/h1\s*\{/i.test(clean)) earned += 1;
                if (/font-size\s*:\s*36px/i.test(clean)) earned += 1;
                if (/color\s*:\s*#00FF00/i.test(clean) || /color\s*:\s*#00ff00/i.test(clean)) earned += 1;
                if (/\{.*\}/s.test(clean) && /:\s*/.test(clean) && /;\s*/.test(clean)) earned += 1;
                earned = Math.min(earned, max);
                parts.push('Check for "h1", "font-size: 36px", "color: #00FF00", and correct syntax');
                if (earned === 0) parts.push('No key parts found.');
                else if (earned < max) parts.push(`Found ${earned} of ${max} required parts.`);
                else parts.push('✅ Perfect!');
            } else if (q.id === 'q35') {
                if (/p\s*\{/i.test(clean)) earned += 1;
                if (/font-family\s*:\s*Arial/i.test(clean) || /font-family\s*:\s*arial/i.test(clean)) earned += 1;
                if (/text-align\s*:\s*center/i.test(clean)) earned += 1;
                if (/font-weight\s*:\s*bold/i.test(clean)) earned += 1;
                if (/\{.*\}/s.test(clean) && /:\s*/.test(clean) && /;\s*/.test(clean)) earned += 1;
                earned = Math.min(earned, max);
                parts.push('Check for "p", "font-family: Arial", "text-align: center", "font-weight: bold", and syntax');
                if (earned === 0) parts.push('No key parts found.');
                else if (earned < max) parts.push(`Found ${earned} of ${max} required parts.`);
                else parts.push('✅ Perfect!');
            } else if (q.id === 'q36') {
                if (/body\s*\{/i.test(clean)) earned += 1;
                if (/background\s*:/i.test(clean)) earned += 1;
                if (/linear-gradient\s*\(/i.test(clean)) earned += 1;
                const colorMatches = clean.match(/[#a-f0-9]{3,6}|[a-z]+/gi);
                let colorCount = 0;
                if (colorMatches) {
                    const colorKeywords = ['blue', 'white', 'red', 'green', 'pink', 'black', 'yellow', 'purple', 'orange',
                        'grey', 'gray', 'cyan', 'magenta', 'lime', 'olive', 'maroon', 'navy', 'teal', 'aqua', 'fuchsia',
                        'silver', 'gold', 'tan', 'coral', 'salmon', 'khaki', 'plum', 'orchid', 'violet', 'indigo',
                        'crimson', 'dark', 'light'
                    ];
                    let foundColors = colorMatches.filter(c => {
                        const lower = c.toLowerCase();
                        if (/^#[0-9a-f]{3,6}$/i.test(lower)) return true;
                        return colorKeywords.some(k => lower === k);
                    });
                    foundColors = [...new Set(foundColors.map(c => c.toLowerCase()))];
                    colorCount = Math.min(foundColors.length, 2);
                }
                earned += Math.min(colorCount, 2);
                if (/\{.*\}/s.test(clean) && /:\s*/.test(clean) && /;\s*/.test(clean)) earned += 1;
                earned = Math.min(earned, max);
                parts.push(
                    'Check for "body", "background", "linear-gradient()", two colours, and correct syntax');
                if (earned === 0) parts.push('No key parts found.');
                else if (earned < max) parts.push(`Found ${earned} of ${max} required parts.`);
                else parts.push('✅ Perfect!');
            }

            return { earned, feedback: parts.join('<br>') };
        }

        function resetQuiz() {
            document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
            document.querySelectorAll('input[type="text"], textarea').forEach(el => el.value = '');

            document.querySelectorAll('.question').forEach(el => {
                el.classList.remove('correct', 'incorrect');
            });
            document.querySelectorAll('.options label').forEach(el => {
                el.classList.remove('selected-correct', 'selected-incorrect', 'show-correct');
            });
            document.querySelectorAll('.feedback').forEach(el => {
                el.className = 'feedback';
                el.innerHTML = '';
            });
            document.querySelectorAll('.code-input-area textarea').forEach(el => {
                el.classList.remove('correct-input', 'incorrect-input');
            });

            document.querySelectorAll('.q-marks').forEach(el => {
                const qId = el.closest('.question').dataset.qid;
                const q = QUESTIONS.find(q => q.id === qId);
                if (q) {
                    const maxStr = q.maxMarks > 0 ? `${q.marks}/${q.maxMarks}` : '0/0';
                    el.textContent = maxStr;
                }
            });

            scoreDisplay.textContent = '—';
            finalScoreSpan.textContent = '0';
            gradeLabel.textContent = '—';
            resultBox.classList.remove('show');
            resultDetail.innerHTML = '';
        }

        document.getElementById('submitBtn').addEventListener('click', gradeQuiz);
        document.getElementById('resetBtn').addEventListener('click', resetQuiz);

        renderQuestions();
    </script>
