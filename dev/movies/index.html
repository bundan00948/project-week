<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Cinema — Dev Movies</title>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/dev-catalog.css">
  <link rel="stylesheet" href="/assets/css/dev-movies.css">
</head>
<body>
  <div class="dev-shell cinema-shell" id="devShell" hidden>
    <nav class="cinema-nav">
      <div class="cinema-brand">
        <div class="cinema-brand-mark" aria-hidden="true"><i class="fas fa-film"></i></div>
        <div class="cinema-brand-text">
          <span class="cinema-brand-name">Cinema</span>
          <span class="cinema-brand-tag">Dev catalogue</span>
        </div>
      </div>
      <div class="cinema-nav-search">
        <input type="search" id="devSearch" placeholder="Search movies…" autocomplete="off" aria-label="Search movies">
      </div>
      <div class="cinema-nav-actions">
        <button type="button" class="cinema-btn cinema-btn-primary" data-dev-form-toggle aria-expanded="false">Suggest a title</button>
      </div>
    </nav>

    <section class="cinema-spotlight" aria-label="Featured movies">
      <div class="cinema-spotlight-inner" id="cinemaCarousel">
        <div class="dev-status" id="devStatus">Loading catalogue…</div>
      </div>
    </section>

    <section class="cinema-section" aria-label="Browse by genre">
      <div class="cinema-section-head">
        <h2>Browse by genre</h2>
        <p class="cinema-section-sub">Pick a category to explore</p>
      </div>
      <div class="cinema-genres" id="cinemaCategories" hidden></div>
    </section>

    <section class="cinema-section cinema-catalogue" id="cinemaCatalogue" aria-label="Movie catalogue">
      <div class="cinema-section-head">
        <h2 id="cinemaActiveCategory">Catalogue</h2>
        <p class="cinema-section-sub" id="cinemaResultCount">0 titles</p>
      </div>
      <main class="cinema-grid" id="devGrid" hidden></main>
    </section>

    <p class="cinema-foot">Dev-only — not linked from the main site. <a href="/games/movies">Game Universe movies</a></p>

    <div class="cinema-drawer-backdrop" data-dev-form-backdrop hidden></div>
    <div class="dev-form-panel" data-dev-form-panel hidden>
      <div class="dev-form-card">
        <div class="dev-form-head">
          <h2>Suggest a title</h2>
          <button type="button" class="cinema-btn" data-dev-form-close>Close</button>
        </div>
        <form id="devAddMovieForm">
          <div class="dev-form-grid">
            <label class="dev-field dev-field-full">
              <span>Title</span>
              <input type="text" name="title" required placeholder="Movie title">
            </label>
            <label class="dev-field">
              <span>Category</span>
              <select name="category" id="devMovieCategory" required></select>
            </label>
            <label class="dev-field">
              <span>Release year</span>
              <input type="number" name="releaseYear" min="1900" max="2100" value="2026">
            </label>
            <label class="dev-field">
              <span>Score (0–10)</span>
              <input type="number" name="score" min="0" max="10" step="0.1" value="7">
            </label>
            <label class="dev-field dev-field-full">
              <span>Banner image URL</span>
              <input type="url" name="banner" placeholder="https://… (wide backdrop for carousel)">
            </label>
            <label class="dev-field dev-field-full">
              <span>Title image URL (optional)</span>
              <input type="url" name="titleImage" placeholder="https://… (logo / title art)">
            </label>
            <label class="dev-field dev-field-full">
              <span>Stream / watch URL</span>
              <input type="url" name="url" placeholder="https://…">
            </label>
            <label class="dev-field dev-field-full">
              <span>Synopsis (optional)</span>
              <textarea name="description" placeholder="Short synopsis for the detail view…"></textarea>
            </label>
          </div>
          <div class="dev-form-actions">
            <button type="submit" class="cinema-btn cinema-btn-primary">Submit suggestion</button>
            <button type="reset" class="cinema-btn">Reset</button>
          </div>
          <p class="dev-form-msg" id="devFormMsg"></p>
        </form>
      </div>
    </div>
  </div>

  <div class="cinema-detail" id="cinemaDetailModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="cinemaDetailTitle">
    <div class="cinema-detail-panel">
      <div class="cinema-detail-backdrop" id="cinemaDetailBackdrop"></div>
      <div class="cinema-detail-content">
        <button type="button" class="cinema-detail-close" id="cinemaDetailClose" aria-label="Close">×</button>
        <p class="cinema-detail-kicker">Now streaming</p>
        <img class="cinema-detail-title-image" id="cinemaDetailTitleImage" alt="" hidden>
        <h2 class="cinema-detail-title" id="cinemaDetailTitle">Movie title</h2>
        <div class="cinema-detail-meta" id="cinemaDetailMeta"></div>
        <p class="cinema-detail-desc" id="cinemaDetailDesc"></p>
        <div class="cinema-detail-actions">
          <a class="cinema-watch-btn" id="cinemaDetailWatch" href="#">Watch now</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { mountDevAccessGate } from '/assets/js/dev/access-gate.js';
    import { mountMoviesCatalog } from '/assets/js/dev/movies-catalog.js';

    mountDevAccessGate('movies', {
      label: 'Dev movies',
      hint: 'Enter the dev movies access code to browse and watch without signing in.',
      onUnlock() {
        const shell = document.getElementById('devShell');
        if (shell) shell.hidden = false;
        mountMoviesCatalog(document);
      }
    });
  </script>
</body>
</html>
