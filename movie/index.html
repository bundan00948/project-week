<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Player</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #06080d;
      color: #fff;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 8px 10px;
      background: rgba(6, 8, 13, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 8px;
      background: #0f131b;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      text-decoration: none;
      padding: 6px 10px;
      cursor: pointer;
    }
    .back-btn:hover {
      background: #fff;
      color: #000;
    }
    .player-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    .movie-frame {
      width: 100%;
      height: calc(100vh - 46px);
      border: 0;
      background: #000;
    }
    .status {
      margin: auto;
      max-width: 680px;
      padding: 20px;
      text-align: center;
      color: #d6deea;
      line-height: 1.5;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a class="back-btn" id="backBtn" href="/games.html?page=movies-page" aria-label="Back to movies">← Back</a>
  </div>
  <div class="player-shell" id="playerShell">
    <div class="status" id="statusMessage">Loading movie...</div>
  </div>

  <script>
    (function () {
      const MOVIE_ROUTE_CACHE_KEY = "movieRouteCacheV2";
      const backBtn = document.getElementById("backBtn");
      const playerShell = document.getElementById("playerShell");
      const statusMessage = document.getElementById("statusMessage");
      const params = new URLSearchParams(window.location.search);
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const marker = pathParts.findIndex((part) => part.toLowerCase() === "movie");
      const routeYear = marker >= 0 ? String(pathParts[marker + 1] || "").trim() : "";
      const routeCategoryId = marker >= 0 ? String(pathParts[marker + 2] || "").trim() : "";
      const routeMovieId = marker >= 0 ? String(pathParts[marker + 3] || "").trim() : "";
      const routeKey = routeYear && routeCategoryId && routeMovieId
        ? `${routeYear}/${routeCategoryId}/${routeMovieId}`
        : "";

      let routeEntry = null;
      if (routeKey) {
        try {
          const parsed = JSON.parse(localStorage.getItem(MOVIE_ROUTE_CACHE_KEY) || "{}");
          if (parsed && typeof parsed === "object" && parsed[routeKey]) {
            routeEntry = parsed[routeKey];
          }
        } catch (_) {}
      }

      let movieUrl = String(routeEntry?.url || "").trim();
      if (!movieUrl) {
        // Legacy fallback:
        // /movie/?url=<encoded>
        // /movie/=?<encoded>
        // /movie/?<encoded>
        movieUrl = String(params.get("url") || params.get("u") || "").trim();
        if (!movieUrl) {
          const rawQuery = String(window.location.search || "").replace(/^\?/, "");
          if (rawQuery.startsWith("=")) movieUrl = rawQuery.slice(1);
          else if (rawQuery && !rawQuery.includes("=")) movieUrl = rawQuery;
        }
      }

      let resolvedMovieUrl = "";
      try {
        const parsed = new URL(movieUrl, window.location.origin);
        if (!/^https?:$/i.test(parsed.protocol)) throw new Error("bad protocol");
        resolvedMovieUrl = parsed.toString();
      } catch (_) {
        statusMessage.textContent = "This movie key is unavailable. Please open the movie from the Movies page again.";
        return;
      }

      const backMovieDocId = String(routeEntry?.movieDocId || "").trim();
      backBtn.href = backMovieDocId
        ? `/games.html?page=movies-page&movie=${encodeURIComponent(backMovieDocId)}`
        : "/games.html?page=movies-page";

      const frame = document.createElement("iframe");
      frame.className = "movie-frame";
      frame.loading = "eager";
      frame.referrerPolicy = "no-referrer";
      frame.allowFullscreen = true;
      frame.sandbox = "allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-modals";
      frame.src = resolvedMovieUrl;
      frame.addEventListener("load", function () {
        if (statusMessage && statusMessage.parentNode === playerShell) {
          statusMessage.remove();
        }
      });
      playerShell.appendChild(frame);
    })();
  </script>
</body>
</html>
