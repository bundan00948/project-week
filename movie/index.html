<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Player</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #06080d;
      color: #fff;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 8px 10px;
      background: rgba(6, 8, 13, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 8px;
      background: #0f131b;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      text-decoration: none;
      padding: 6px 10px;
      cursor: pointer;
    }
    .back-btn:hover {
      background: #fff;
      color: #000;
    }
    .player-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    .movie-frame {
      width: 100%;
      height: calc(100vh - 46px);
      border: 0;
      background: #000;
    }
    .status {
      margin: auto;
      max-width: 680px;
      padding: 20px;
      text-align: center;
      color: #d6deea;
      line-height: 1.5;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <a class="back-btn" id="backBtn" href="/games.html?page=movies-page" aria-label="Back to movies">← Back</a>
  </div>
  <div class="player-shell" id="playerShell">
    <div class="status" id="statusMessage">Loading movie...</div>
  </div>

  <script>
    (async function () {
      const MOVIE_ROUTE_CACHE_KEY = "movieRouteCacheV2";
      const MAX_CATEGORY_ID = 999;
      const MAX_MOVIE_ID = 999999;
      const backBtn = document.getElementById("backBtn");
      const playerShell = document.getElementById("playerShell");
      const statusMessage = document.getElementById("statusMessage");
      const params = new URLSearchParams(window.location.search);
      const toBoundedPositiveInt = (value, max) => {
        const n = Number.parseInt(value, 10);
        if (!Number.isFinite(n) || n < 0 || n > max) return null;
        return n;
      };
      const toCategoryPart = (value) => {
        const n = toBoundedPositiveInt(value, MAX_CATEGORY_ID);
        return n === null ? null : String(n).padStart(3, "0");
      };
      const toMoviePart = (value) => {
        const n = toBoundedPositiveInt(value, MAX_MOVIE_ID);
        return n === null ? null : String(n).padStart(6, "0");
      };
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const marker = pathParts.findIndex((part) => part.toLowerCase() === "movie");
      const routeYear = marker >= 0 ? String(pathParts[marker + 1] || "").trim() : "";
      const routeCategoryId = marker >= 0 ? String(pathParts[marker + 2] || "").trim() : "";
      const routeMovieId = marker >= 0 ? String(pathParts[marker + 3] || "").trim() : "";
      const routeKey = routeYear && routeCategoryId && routeMovieId
        ? `${routeYear}/${routeCategoryId}/${routeMovieId}`
        : "";

      let routeEntry = null;
      if (routeKey) {
        try {
          const parsed = JSON.parse(localStorage.getItem(MOVIE_ROUTE_CACHE_KEY) || "{}");
          if (parsed && typeof parsed === "object") {
            routeEntry = parsed[routeKey] || null;
            if (!routeEntry) {
              const normalizedCategory = toCategoryPart(routeCategoryId);
              const normalizedMovie = toMoviePart(routeMovieId);
              const normalizedKey = normalizedCategory && normalizedMovie
                ? `${routeYear}/${normalizedCategory}/${normalizedMovie}`
                : "";
              if (normalizedKey && parsed[normalizedKey]) {
                routeEntry = parsed[normalizedKey];
              } else {
                const catInt = toBoundedPositiveInt(routeCategoryId, MAX_CATEGORY_ID);
                const movieInt = toBoundedPositiveInt(routeMovieId, MAX_MOVIE_ID);
                const legacyKey = (catInt !== null && movieInt !== null)
                  ? `${routeYear}/${catInt}/${movieInt}`
                  : "";
                if (legacyKey && parsed[legacyKey]) {
                  routeEntry = parsed[legacyKey];
                }
              }
            }
          }
        } catch (_) {}
      }

      const firebaseConfig = {
        apiKey: "AIzaSyC49VFcW1pjHq0sCkdcps_DwUAoo4z5oaw",
        authDomain: "blacket-65c5b.firebaseapp.com",
        databaseURL: "https://blacket-65c5b-default-rtdb.firebaseio.com",
        projectId: "blacket-65c5b",
        storageBucket: "blacket-65c5b.firebasestorage.app",
        messagingSenderId: "497023905730",
        appId: "1:497023905730:web:a59093052a3f93a476305b",
        measurementId: "G-XZZR5DH79B"
      };

      async function fetchRouteEntryFromFirestore() {
        const yearInt = Number.parseInt(routeYear, 10);
        const catInt = toBoundedPositiveInt(routeCategoryId, MAX_CATEGORY_ID);
        const movieInt = toBoundedPositiveInt(routeMovieId, MAX_MOVIE_ID);
        if (!Number.isFinite(yearInt) || catInt === null || movieInt === null) return null;
        try {
          const appModule = await import("https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js");
          const firestoreModule = await import("https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js");
          const app = appModule.getApps().length
            ? appModule.getApps()[0]
            : appModule.initializeApp(firebaseConfig);
          const db = firestoreModule.getFirestore(app);
          const moviesCol = firestoreModule.collection(db, "movies");
          let bestDoc = null;

          // Try strict route match first (may require index in some projects).
          try {
            const strictQ = firestoreModule.query(
              moviesCol,
              firestoreModule.where("movieKey", "==", movieInt),
              firestoreModule.where("categoryId", "==", catInt),
              firestoreModule.where("releaseYear", "==", yearInt),
              firestoreModule.limit(1)
            );
            const strictSnap = await firestoreModule.getDocs(strictQ);
            if (!strictSnap.empty) bestDoc = strictSnap.docs[0];
          } catch (_) {}

          // Fallback: movieKey only, then rank locally by category/year.
          if (!bestDoc) {
            const byKeyQ = firestoreModule.query(
              moviesCol,
              firestoreModule.where("movieKey", "==", movieInt),
              firestoreModule.limit(12)
            );
            const byKeySnap = await firestoreModule.getDocs(byKeyQ);
            if (!byKeySnap.empty) {
              const sorted = byKeySnap.docs.slice().sort((a, b) => {
                const da = a.data() || {};
                const dbb = b.data() || {};
                const scoreA = (Number(da.categoryId) === catInt ? 2 : 0) + (Number(da.releaseYear) === yearInt ? 1 : 0);
                const scoreB = (Number(dbb.categoryId) === catInt ? 2 : 0) + (Number(dbb.releaseYear) === yearInt ? 1 : 0);
                return scoreB - scoreA;
              });
              bestDoc = sorted[0] || null;
            }
          }

          if (!bestDoc) return null;
          const data = bestDoc.data() || {};
          const candidateUrl = String(data.url || data.movieUrl || data.fullMovieUrl || "").trim();
          if (!candidateUrl) return null;
          const entry = {
            url: candidateUrl,
            movieDocId: bestDoc.id,
            movieTitle: String(data.title || ""),
            movieKey: movieInt,
            categoryId: catInt,
            year: yearInt,
            updatedAt: Date.now()
          };
          if (routeKey) {
            try {
              const parsed = JSON.parse(localStorage.getItem(MOVIE_ROUTE_CACHE_KEY) || "{}");
              parsed[routeKey] = entry;
              localStorage.setItem(MOVIE_ROUTE_CACHE_KEY, JSON.stringify(parsed));
            } catch (_) {}
          }
          return entry;
        } catch (_) {
          return null;
        }
      }

      let movieUrl = String(routeEntry?.url || "").trim();
      if (!movieUrl) {
        // Legacy fallback:
        // /movie/?url=<encoded>
        // /movie/=?<encoded>
        // /movie/?<encoded>
        movieUrl = String(params.get("url") || params.get("u") || "").trim();
        if (!movieUrl) {
          const rawQuery = String(window.location.search || "").replace(/^\?/, "");
          if (rawQuery.startsWith("=")) movieUrl = rawQuery.slice(1);
          else if (rawQuery && !rawQuery.includes("=")) movieUrl = rawQuery;
        }
      }

      if (!movieUrl && routeKey) {
        statusMessage.textContent = "Resolving movie route...";
        const fetchedEntry = await fetchRouteEntryFromFirestore();
        if (fetchedEntry) {
          routeEntry = fetchedEntry;
          movieUrl = String(fetchedEntry.url || "").trim();
        }
      }

      let resolvedMovieUrl = "";
      try {
        const parsed = new URL(movieUrl, window.location.origin);
        if (!/^https?:$/i.test(parsed.protocol)) throw new Error("bad protocol");
        resolvedMovieUrl = parsed.toString();
      } catch (_) {
        statusMessage.textContent = "This movie key is unavailable. Please open the movie from the Movies page again.";
        return;
      }

      const backMovieDocId = String(routeEntry?.movieDocId || "").trim();
      backBtn.href = backMovieDocId
        ? `/games.html?page=movies-page&movie=${encodeURIComponent(backMovieDocId)}`
        : "/games.html?page=movies-page";

      const frame = document.createElement("iframe");
      frame.className = "movie-frame";
      frame.loading = "eager";
      frame.referrerPolicy = "no-referrer";
      frame.allowFullscreen = true;
      frame.sandbox = "allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-modals";
      frame.src = resolvedMovieUrl;
      frame.addEventListener("load", function () {
        if (statusMessage && statusMessage.parentNode === playerShell) {
          statusMessage.remove();
        }
      });
      playerShell.appendChild(frame);
    })();
  </script>
</body>
</html>
