<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Universe - Movies</title>
  <script>
    (function () {
      const target = new URL("games.html", window.location.href);
      target.searchParams.set("page", "movies-page");
      const sourceParams = new URLSearchParams(window.location.search);
      ["movie", "play", "cat", "q"].forEach((key) => {
        const value = String(sourceParams.get(key) || "").trim();
        if (value) target.searchParams.set(key, value);
      });
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  Redirecting to Movies...
</body>
</html>
