<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Movies</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #06080d;
      --panel: rgba(9, 13, 20, 0.92);
      --border: rgba(171, 207, 255, 0.14);
      --muted: #b8c8de;
      --accent: #55beff;
      --text: #eef3fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      line-height: 1.45;
    }
    header {
      padding: 16px 18px 8px;
      border-bottom: 1px solid var(--border);
      background: rgba(6, 8, 13, 0.96);
    }
    header h1 {
      margin: 0 0 6px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    header p {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
      max-width: 52rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 11, 18, 0.9);
    }
    .toolbar label {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 200px;
    }
    .toolbar input[type="search"] {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f131b;
      color: var(--text);
      font: inherit;
    }
    .cats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 18px 4px;
    }
    .cat-btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(130deg, #324f91 0%, #17284b 100%);
    }
    .cat-btn.active {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      padding: 14px 18px 28px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-height: 280px;
    }
    .card-banner {
      aspect-ratio: 16 / 9;
      width: 100%;
      display: block;
      background: #111822 center/cover no-repeat #0a0e14;
      object-fit: cover;
    }
    .card-body {
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }
    .card-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1.25;
    }
    .card-meta {
      font-size: 0.72rem;
      color: var(--muted);
    }
    .card-desc {
      margin: 0;
      font-size: 0.76rem;
      color: var(--muted);
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .watch {
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border-radius: 8px;
      border: 0;
      font-weight: 800;
      font-size: 0.78rem;
      cursor: pointer;
      text-decoration: none;
      background: linear-gradient(135deg, #3a8fd6, #6b4dff);
      color: #fff;
    }
    .watch[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #status {
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
    }
    #status.err { color: #ff8b9d; }
    .foot {
      padding: 16px 18px 28px;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }
    .foot a { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Movies</h1>
    <p>Unlisted catalogue. No account required. Watch opens in the separate movie player.</p>
  </header>
  <div class="toolbar">
    <label>Search titles
      <input type="search" id="q" placeholder="Type to filter…" autocomplete="off">
    </label>
  </div>
  <div class="cats" id="cats" hidden></div>
  <div id="status">Loading catalogue…</div>
  <main class="grid" id="grid" hidden></main>
  <p class="foot">This page is not linked from the main site. <a href="/games-main.html">Game Universe home</a></p>

  <script type="module">
    const firebaseConfig = {
      apiKey: "AIzaSyC49VFcW1pjHq0sCkdcps_DwUAoo4z5oaw",
      authDomain: "blacket-65c5b.firebaseapp.com",
      databaseURL: "https://blacket-65c5b-default-rtdb.firebaseio.com",
      projectId: "blacket-65c5b",
      storageBucket: "blacket-65c5b.firebasestorage.app",
      messagingSenderId: "497023905730",
      appId: "1:497023905730:web:a59093052a3f93a476305b",
      measurementId: "G-XZZR5DH79B"
    };

    const MAX_MOVIE_KEY_ID = 999999;
    const MAX_MOVIE_CATEGORY_ID = 999;

    const statusEl = document.getElementById("status");
    const gridEl = document.getElementById("grid");
    const catsEl = document.getElementById("cats");
    const qEl = document.getElementById("q");

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function toBoundedPositiveInt(raw, max) {
      const n = Number.parseInt(raw, 10);
      if (!Number.isFinite(n) || n < 0 || n > max) return null;
      return n;
    }

    function stableNumericKey(seed, max) {
      const source = String(seed || "").trim();
      if (!source) return 0;
      let hash = 0;
      for (let i = 0; i < source.length; i++) {
        hash = ((hash * 131) + source.charCodeAt(i)) % 2147483647;
      }
      return Math.abs(hash) % (max + 1);
    }

    function normalizeMovieCategory(value, pool) {
      const keysLower = pool.map((cfg) => String(cfg.key || "").toLowerCase());
      const raw = String(value || "").trim();
      if (!pool.length) return raw || "Uncategorized";
      if (!raw) return pool[0].key;
      const lower = raw.toLowerCase();
      for (const cfg of pool) {
        const keyLower = String(cfg.key || "").toLowerCase();
        if (lower === keyLower || lower === keyLower.replace("-", "")) return cfg.key;
      }
      if (lower.includes("anim")) {
        const i = keysLower.findIndex((k) => k.includes("anim"));
        if (i >= 0) return pool[i].key;
      }
      if (lower.includes("sci")) {
        const i = keysLower.findIndex((k) => k.includes("sci"));
        if (i >= 0) return pool[i].key;
      }
      return raw || pool[0].key;
    }

    function normalizeMovieDoc(raw, fallbackId, categories, indexHint = 0) {
      const releaseYear = Number.parseInt(raw.releaseYear || raw.year || raw.release || raw.release_date, 10) || 0;
      const score = Number.parseFloat(raw.score ?? raw.rating ?? raw.voteAverage ?? 0) || 0;
      const category = normalizeMovieCategory(raw.category || raw.catagory || raw.genre, categories);
      const categoryCfg = (Array.isArray(categories) ? categories : []).find((cfg) => String(cfg.key) === String(category));
      const categoryId = toBoundedPositiveInt(raw.categoryId ?? categoryCfg?.categoryId, MAX_MOVIE_CATEGORY_ID);
      const fallbackMovieKey = (indexHint + 1) <= MAX_MOVIE_KEY_ID ? (indexHint + 1) : stableNumericKey(raw.id || fallbackId || raw.title || "", MAX_MOVIE_KEY_ID);
      const movieKey = toBoundedPositiveInt(raw.movieKey ?? raw.movieIdKey ?? raw.key, MAX_MOVIE_KEY_ID);
      return {
        id: raw.id || fallbackId,
        movieKey: movieKey !== null ? movieKey : fallbackMovieKey,
        title: String(raw.title || raw.name || "Untitled Movie"),
        category,
        categoryId: categoryId !== null ? categoryId : (categoryCfg?.categoryId ?? 0),
        releaseYear,
        score: Number(score.toFixed(1)),
        banner: String(raw.banner || raw.image || raw.poster || ""),
        description: String(raw.description || raw.desc || raw.synopsis || raw.overview || ""),
        url: String(raw.url || raw.movieUrl || raw.fullMovieUrl || "")
      };
    }

    function movieNewestComparator(a, b) {
      return (b.releaseYear || 0) - (a.releaseYear || 0) ||
        (b.score || 0) - (a.score || 0) ||
        String(a.title || "").localeCompare(String(b.title || ""));
    }

    function buildMoviesData(movieItems, categoryConfig) {
      const cfg = (Array.isArray(categoryConfig) && categoryConfig.length) ? categoryConfig : [];
      const moviesByCategory = {};
      cfg.forEach((c) => { moviesByCategory[c.key] = []; });
      (movieItems || []).forEach((movie, idx) => {
        const fixed = normalizeMovieDoc(movie, movie.id || `m-${idx}`, cfg, idx);
        if (!moviesByCategory[fixed.category]) moviesByCategory[fixed.category] = [];
        moviesByCategory[fixed.category].push(fixed);
      });
      Object.keys(moviesByCategory).forEach((cat) => moviesByCategory[cat].sort(movieNewestComparator));
      const inferredCategories = cfg.length
        ? cfg
        : Object.keys(moviesByCategory).map((key, idx) => ({
            key,
            categoryId: (idx + 1) <= MAX_MOVIE_CATEGORY_ID ? (idx + 1) : stableNumericKey(key, MAX_MOVIE_CATEGORY_ID),
            order: idx
          }));
      const normalizedCategories = inferredCategories.map((c, idx) => ({
        ...c,
        categoryId: toBoundedPositiveInt(c.categoryId, MAX_MOVIE_CATEGORY_ID) ?? ((idx + 1) <= MAX_MOVIE_CATEGORY_ID ? (idx + 1) : stableNumericKey(c.key || idx, MAX_MOVIE_CATEGORY_ID)),
        order: Number.isFinite(Number(c.order)) ? Number(c.order) : idx,
        count: (moviesByCategory[c.key] || []).length
      }));
      return { categories: normalizedCategories, moviesByCategory };
    }

    function resolveMovieUrl(url) {
      const source = String(url || "").trim();
      if (!source) return null;
      try {
        const parsed = new URL(source, window.location.href);
        if (!/^https?:$/i.test(parsed.protocol)) return null;
        return parsed.toString();
      } catch {
        return null;
      }
    }

    function watchPlayerHref(movie) {
      const u = resolveMovieUrl(movie.url);
      if (!u) return null;
      return new URL(`/movie/?u=${encodeURIComponent(u)}`, window.location.origin).toString();
    }

    async function loadDb() {
      const appModule = await import("https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js");
      const fsModule = await import("https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js");
      const app = appModule.getApps().length ? appModule.getApps()[0] : appModule.initializeApp(firebaseConfig);
      const db = fsModule.getFirestore(app);

      let categoryRows = [];
      try {
        let snap;
        try {
          snap = await fsModule.getDocs(fsModule.query(fsModule.collection(db, "movieCategories"), fsModule.orderBy("order", "asc")));
        } catch {
          snap = await fsModule.getDocs(fsModule.collection(db, "movieCategories"));
        }
        categoryRows = snap.docs.map((d, i) => {
          const x = d.data() || {};
          const key = String(x.key || x.name || "").trim();
          if (!key) return null;
          const categoryId = toBoundedPositiveInt(x.categoryId ?? x.categoryKey ?? x.numericId, MAX_MOVIE_CATEGORY_ID);
          const fallbackCategoryId = (i + 1) <= MAX_MOVIE_CATEGORY_ID ? (i + 1) : stableNumericKey(key, MAX_MOVIE_CATEGORY_ID);
          return {
            id: d.id,
            key,
            categoryId: categoryId !== null ? categoryId : fallbackCategoryId,
            order: Number.isFinite(Number(x.order)) ? Number(x.order) : i
          };
        }).filter(Boolean).sort((a, b) => (a.order || 0) - (b.order || 0));
      } catch (e) {
        console.warn("movieCategories:", e);
      }

      let movies = [];
      try {
        const snap = await fsModule.getDocs(fsModule.collection(db, "movies"));
        movies = snap.docs.map((d, i) => normalizeMovieDoc({ id: d.id, ...d.data() }, d.id, categoryRows, i));
      } catch (e) {
        console.warn("movies:", e);
      }

      return buildMoviesData(movies, categoryRows);
    }

    let data = null;
    let activeCat = "";
    let q = "";

    function visibleList() {
      const list = [...(data.moviesByCategory[activeCat] || [])];
      const needle = q.trim().toLowerCase();
      if (!needle) return list;
      return list.filter((m) => String(m.title || "").toLowerCase().includes(needle));
    }

    function render() {
      if (!data) return;
      const list = visibleList();
      gridEl.innerHTML = list.length
        ? list.map((m) => {
            const href = watchPlayerHref(m);
            const bannerHtml = m.banner
              ? `<img class="card-banner" src="${escapeHtml(m.banner)}" alt="" loading="lazy">`
              : `<div class="card-banner" aria-hidden="true"></div>`;
            const watch = href
              ? `<a class="watch" href="${escapeHtml(href)}">Watch</a>`
              : `<button type="button" class="watch" disabled>No URL</button>`;
            return `<article class="card">
              ${bannerHtml}
              <div class="card-body">
                <h2 class="card-title">${escapeHtml(m.title)}</h2>
                <div class="card-meta">${escapeHtml(m.category)} · ${m.releaseYear || "—"} · ★ ${m.score || "—"}</div>
                <p class="card-desc">${escapeHtml(m.description || "")}</p>
                ${watch}
              </div>
            </article>`;
          }).join("")
        : `<div class="empty-grid" style="grid-column:1/-1;text-align:center;padding:20px;color:var(--muted);">No titles in this view.</div>`;
    }

    function renderCats() {
      catsEl.innerHTML = "";
      data.categories.forEach((c) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "cat-btn" + (c.key === activeCat ? " active" : "");
        b.textContent = `${c.key} (${c.count})`;
        b.addEventListener("click", () => {
          activeCat = c.key;
          catsEl.querySelectorAll(".cat-btn").forEach((x) => x.classList.remove("active"));
          b.classList.add("active");
          render();
        });
        catsEl.appendChild(b);
      });
    }

    try {
      data = await loadDb();
      if (!data.categories.length) {
        statusEl.textContent = "No categories loaded. Check Firestore rules and data.";
        statusEl.classList.add("err");
        return;
      }
      activeCat = data.categories[0].key;
      statusEl.remove();
      catsEl.hidden = false;
      gridEl.hidden = false;
      renderCats();
      render();
      qEl.addEventListener("input", () => {
        q = qEl.value || "";
        render();
      });
    } catch (e) {
      statusEl.textContent = "Could not load movies: " + (e && e.message ? e.message : String(e));
      statusEl.classList.add("err");
    }
  </script>
</body>
</html>
